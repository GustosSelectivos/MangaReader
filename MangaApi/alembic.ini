# alembic.ini
# ============
# Configuración de Alembic para MangaApiV2.
# IMPORTANTE: No ejecutar 'alembic upgrade head' sobre la BD de producción
# sin antes hacer 'alembic stamp head' para marcar el estado actual.

[alembic]
script_location = alembic
prepend_sys_path = .

# La URL se sobreescribe en alembic/env.py desde pydantic-settings
sqlalchemy.url = mysql+asyncmy://user:pass@localhost/db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
